name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./cmd/cw ./internal/... -timeout 120s -count=1

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Run go vet
        run: go vet ./...

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o cw ./cmd/cw

      - name: Verify binary exists
        run: test -f cw

  docker-integration:
    name: Docker Integration
    runs-on: ubuntu-latest
    # Catches regressions in `cw local create --backend docker` against real
    # docker (entrypoint override, mount semantics, container lifecycle). The
    # underlying tests are gated by CODEWIRE_TEST_DOCKER=1 so they're a no-op
    # locally unless explicitly opted in.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Run docker-backed local integration tests
        env:
          CODEWIRE_TEST_DOCKER: "1"
        run: go test ./cmd/cw -run TestLocalDockerLifecycleIntegration -timeout 5m -count=1 -v

  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4

      - name: Lint codewire-relay chart
        run: helm lint charts/codewire-relay/ --strict

      - name: Template codewire-relay chart
        run: |
          helm template test-relay charts/codewire-relay/ \
            --set relay.baseURL=https://test.relay.example.com \
            > /dev/null

  relay-image-build:
    name: Relay Image Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build relay image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64
          build-args: |
            VERSION=ci
